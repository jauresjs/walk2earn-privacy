<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Walk2Earn Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: linear-gradient(135deg, #F5F3FF 0%, #EDE9FE 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: #FFF;
      border-radius: 24px;
      padding: 40px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 20px 60px rgba(79, 70, 229, 0.15);
    }
    .logo { text-align: center; margin-bottom: 32px; }
    .logo h1 { font-size: 24px; color: #1E1B4B; font-weight: 800; }
    .logo p { color: #6B7280; font-size: 14px; margin-top: 4px; }
    .logo .icon { font-size: 48px; display: block; margin-bottom: 8px; }

    .form-group { margin-bottom: 20px; }
    label { display: block; font-size: 14px; font-weight: 600; color: #374151; margin-bottom: 6px; }
    input, textarea {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid #E5E7EB;
      border-radius: 12px;
      font-size: 15px;
      font-family: inherit;
      color: #1F2937;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus, textarea:focus { border-color: #4F46E5; box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1); }
    textarea { min-height: 100px; resize: vertical; }

    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-primary { background: #4F46E5; color: #FFF; }
    .btn-primary:hover:not(:disabled) { background: #4338CA; transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-secondary { background: #EEF2FF; color: #4F46E5; border: 1px solid #4F46E5; }
    .btn-secondary:hover { background: #E0E7FF; }
    .btn-danger { background: #FEE2E2; color: #DC2626; border: 1px solid #FECACA; }

    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #FFF;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .result-box {
      margin-top: 16px;
      padding: 14px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 500;
      display: none;
    }
    .result-box.success { display: block; background: #D1FAE5; color: #065F46; border-left: 4px solid #10B981; }
    .result-box.error { display: block; background: #FEE2E2; color: #991B1B; border-left: 4px solid #EF4444; }
    .result-box.info { display: block; background: #DBEAFE; color: #1E40AF; border-left: 4px solid #3B82F6; }

    .auth-form { }
    .panel-form { display: none; }
    .panel-form.active { display: block; }

    .user-badge {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #F5F3FF;
      padding: 12px 16px;
      border-radius: 12px;
      margin-bottom: 24px;
    }
    .user-badge .email { font-size: 14px; font-weight: 500; color: #1E1B4B; }
    .user-badge .logout-btn {
      background: none;
      border: none;
      color: #EF4444;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      font-family: inherit;
    }
    .user-badge .logout-btn:hover { text-decoration: underline; }

    .stats {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
    }
    .stat-card {
      flex: 1;
      background: #F5F3FF;
      border-radius: 12px;
      padding: 16px;
      text-align: center;
    }
    .stat-card .value { font-size: 20px; font-weight: 800; color: #1E1B4B; }
    .stat-card .label { font-size: 12px; color: #6B7280; margin-top: 2px; }

    .password-toggle {
      position: relative;
    }
    .password-toggle input { padding-right: 44px; }
    .password-toggle .toggle {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 18px;
      color: #9CA3AF;
    }

    .footer { text-align: center; margin-top: 24px; font-size: 12px; color: #9CA3AF; }

    @media (max-width: 480px) {
      .container { padding: 24px; }
      .stats { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="container" id="app">
    <div class="logo">
      <span class="icon">📢</span>
      <h1>Walk2Earn Admin</h1>
      <p>Send push notifications to all users</p>
    </div>

    <!-- Login Form -->
    <div class="auth-form" id="authForm">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="your@email.com" autocomplete="email" />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <div class="password-toggle">
          <input type="password" id="password" placeholder="Your password" autocomplete="current-password" />
          <button class="toggle" id="togglePassword" type="button" onclick="togglePassword()">👁️</button>
        </div>
      </div>
      <button class="btn btn-primary" id="loginBtn" onclick="handleLogin()">
        🔐 Sign In
      </button>
      <div class="result-box" id="loginResult"></div>
    </div>

    <!-- Admin Panel -->
    <div class="panel-form" id="panelForm">
      <div class="user-badge">
        <span class="email" id="userEmail"></span>
        <button class="logout-btn" onclick="handleLogout()">Sign Out</button>
      </div>

      <div class="stats">
        <div class="stat-card">
          <div class="value" id="userCount">—</div>
          <div class="label">Registered Users</div>
        </div>
        <div class="stat-card">
          <div class="value" id="notifCount">0</div>
          <div class="label">Notifications Sent</div>
        </div>
      </div>

      <div class="form-group">
        <label for="notifTitle">Notification Title *</label>
        <input type="text" id="notifTitle" placeholder="e.g. 🎉 Exclusive Offer!" />
      </div>
      <div class="form-group">
        <label for="notifBody">Notification Body *</label>
        <textarea id="notifBody" placeholder="e.g. Walk 15k steps today for double rewards!"></textarea>
      </div>
      <div class="form-group">
        <label for="notifUrl">Link URL (optional)</label>
        <input type="url" id="notifUrl" placeholder="e.g. https://youroffer.com/promo" />
      </div>

      <button class="btn btn-primary" id="sendBtn" onclick="handleSend()">
        📤 Send to All Users
      </button>
      <div class="result-box" id="sendResult"></div>
    </div>

    <div class="footer">
      Walk2Earn &bull; Powered by Supabase
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://soobuxploceuuopjfkkg.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNvb2J1eHBsb2NldXVvcGpma2tnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDE0MzEzODksImV4cCI6MjA1NzAwNzM4OX0.hiJYvYD8Z9AlEaE5pVg8fVsV1tr0v1Ekjds3sZGVzA0';
    const ADMIN_EMAIL = 'rredemption99@gmail.com';

    let session = null;

    // ====== SUPABASE CLIENT (inline) ======
    const supabase = (() => {
      // Simple Supabase client using fetch directly
      return {
        auth: {
          signInWithPassword: async ({ email, password }) => {
            const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_ANON_KEY },
              body: JSON.stringify({ email, password })
            });
            const data = await res.json();
            if (!res.ok) return { error: { message: data.error_description || data.error || data.msg || 'Login failed' } };
            return { data: { user: data.user, session: { access_token: data.access_token, user: data.user } } };
          },
          signOut: async () => {
            if (!session) return;
            await fetch(`${SUPABASE_URL}/auth/v1/logout`, {
              method: 'POST',
              headers: { 'Authorization': `Bearer ${session.access_token}`, 'apikey': SUPABASE_ANON_KEY }
            });
          },
          getUser: async () => {
            if (!session) return { data: { user: null } };
            const res = await fetch(`${SUPABASE_URL}/auth/v1/user`, {
              headers: { 'Authorization': `Bearer ${session.access_token}`, 'apikey': SUPABASE_ANON_KEY }
            });
            const user = await res.json();
            return { data: { user } };
          }
        },
        from: (table) => {
          return {
            select: (columns) => {
              return {
                then: async (resolve) => {
                  const res = await fetch(
                    `${SUPABASE_URL}/rest/v1/${table}?select=${columns || '*'}`,
                    { headers: { 'Authorization': `Bearer ${session.access_token}`, 'apikey': SUPABASE_ANON_KEY } }
                  );
                  const data = await res.json();
                  if (!res.ok) resolve({ data: null, error: data });
                  resolve({ data, error: null });
                }
              };
            }
          };
        }
      };
    })();

    // ====== UI HELPERS ======
    function showLoginResult(msg, type) {
      const el = document.getElementById('loginResult');
      el.textContent = msg;
      el.className = 'result-box ' + type;
    }
    function hideLoginResult() {
      document.getElementById('loginResult').className = 'result-box';
    }
    function showSendResult(msg, type) {
      const el = document.getElementById('sendResult');
      el.textContent = msg;
      el.className = 'result-box ' + type;
    }
    function hideSendResult() {
      document.getElementById('sendResult').className = 'result-box';
    }
    function setBtnLoading(btnId, loading) {
      const btn = document.getElementById(btnId);
      if (loading) {
        btn.disabled = true;
        btn.innerHTML = '<div class="spinner"></div>';
      } else {
        btn.disabled = false;
        btn.innerHTML = btnId === 'loginBtn' ? '🔐 Sign In' : '📤 Send to All Users';
      }
    }

    // ====== AUTH ======
    async function handleLogin() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) {
        showLoginResult('Please enter your email and password', 'error');
        return;
      }

      setBtnLoading('loginBtn', true);
      hideLoginResult();

      const { data, error } = await supabase.auth.signInWithPassword({ email, password });

      if (error) {
        showLoginResult(error.message || 'Login failed', 'error');
        setBtnLoading('loginBtn', false);
        return;
      }

      if (data.user.email !== ADMIN_EMAIL) {
        showLoginResult('Access denied. Only the admin can use this panel.', 'error');
        await supabase.auth.signOut();
        setBtnLoading('loginBtn', false);
        return;
      }

      session = data.session;

      // Try to restore the full session object for future getUser calls
      // The supabase client we built uses session directly
      setBtnLoading('loginBtn', false);
      showPanel();
    }

    async function handleLogout() {
      if (session) {
        await supabase.auth.signOut();
      }
      session = null;
      showLogin();
    }

    function togglePassword() {
      const pwd = document.getElementById('password');
      pwd.type = pwd.type === 'password' ? 'text' : 'password';
    }

    // ====== ADMIN PANEL ======
    function showPanel() {
      document.getElementById('authForm').style.display = 'none';
      document.getElementById('panelForm').classList.add('active');

      document.getElementById('userEmail').textContent = session?.user?.email || ADMIN_EMAIL;

      loadUserCount();
      loadNotifCount();
    }

    function showLogin() {
      document.getElementById('authForm').style.display = 'block';
      document.getElementById('panelForm').classList.remove('active');
      document.getElementById('password').value = '';
    }

    async function loadUserCount() {
      try {
        const { data, error } = await supabase.from('push_tokens').select('id');
        if (!error && data) {
          document.getElementById('userCount').textContent = data.length;
        }
      } catch (e) {
        // silently fail
      }
    }

    function loadNotifCount() {
      const count = parseInt(localStorage.getItem('notifCount') || '0');
      document.getElementById('notifCount').textContent = count;
    }

    async function handleSend() {
      const title = document.getElementById('notifTitle').value.trim();
      const body = document.getElementById('notifBody').value.trim();
      const url = document.getElementById('notifUrl').value.trim();

      if (!title || !body) {
        showSendResult('Title and body are required', 'error');
        return;
      }

      setBtnLoading('sendBtn', true);
      hideSendResult();

      try {
        const payload = { title, body };
        if (url) payload.url = url;

        const res = await fetch(
          `${SUPABASE_URL}/functions/v1/send-notification`,
          {
            method: 'POST',
            headers: {
              'Authorization': `Bearer ${session.access_token}`,
              'Content-Type': 'application/json',
            },
            body: JSON.stringify(payload),
          }
        );

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.error || 'Failed to send');
        }

        showSendResult(`✅ Notification sent to ${data.sentTo} user(s)!`, 'success');

        // Update count
        let count = parseInt(localStorage.getItem('notifCount') || '0');
        count++;
        localStorage.setItem('notifCount', count);
        document.getElementById('notifCount').textContent = count;

        // Clear form
        document.getElementById('notifTitle').value = '';
        document.getElementById('notifBody').value = '';
        document.getElementById('notifUrl').value = '';
      } catch (e) {
        showSendResult('Error: ' + e.message, 'error');
      } finally {
        setBtnLoading('sendBtn', false);
      }
    }

    // Allow Enter key to submit login
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('password').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') handleLogin();
      });
      document.getElementById('notifBody').addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && e.ctrlKey) handleSend();
      });
    });
  </script>
</body>
</html>
